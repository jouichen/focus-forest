<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專注森林 - 全齡滿配版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="score-board">得分: <span id="score">0</span></div>
        <div id="instruction">🌲 歡迎來到專注森林 🌲</div>
        
        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>
        
        <div id="stage">
            <button id="home-btn" onclick="showMenu()">🏠</button>
            <div id="menu-overlay">
                <h3>請選擇遊戲模式</h3>
                <button class="mode-btn btn-toddler" onclick="selectMode('TODDLER')">👶 幼兒模式 (簡單)</button>
                <button class="mode-btn btn-child" onclick="selectMode('CHILD')">🐿️ 兒童模式 (挑戰)</button>
                <button class="mode-btn btn-senior" onclick="selectMode('SENIOR')">👵 長輩模式 (樂齡)</button>
            </div>
            
            <div id="sub-menu-overlay" style="display:none;">
                <h3 id="sub-menu-title">請選擇遊戲主題</h3>
                <div id="theme-buttons-container"></div>
                <button class="back-btn" onclick="showMenu()">⬅ 重新選擇身份</button>
            </div>
            
            <div id="game-object"></div>
        </div>
        
        <button id="restart-btn" style="display:none;" onclick="showMenu()">返回主選單</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
